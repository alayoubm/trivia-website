<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Trivia ☕</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --espresso:   #1a0800;
      --dark-roast: #241008;
      --coffee:     #4a2512;
      --mocha:      #6b3a2a;
      --caramel:    #b8711a;
      --latte:      #c8956a;
      --cream:      #f0dcc8;
      --foam:       #fdf8f2;
      --ok:         #276749;
      --ok-bg:      #e8f5e9;
      --err:        #b71c1c;
      --err-bg:     #ffebee;
    }

    body {
      font-family: 'Palatino Linotype', Palatino, Georgia, serif;
      background: var(--dark-roast);
      background-image:
        radial-gradient(ellipse at 15% 15%, rgba(74,37,18,.5) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(74,37,18,.5) 0%, transparent 55%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow-x: hidden;
    }

    /* floating background beans */
    .bg-beans { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .bg-bean  {
      position: absolute; font-size: 26px; opacity: .06;
      animation: floatBean linear infinite;
    }
    @keyframes floatBean {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0;   }
      10%  { opacity: .07; }
      90%  { opacity: .07; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0;   }
    }

    /* ── Container & Screens ── */
    .container { width: 100%; max-width: 660px; position: relative; z-index: 1; }

    .screen { display: none; }
    .screen.active { display: block; animation: fadeUp .38s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card ── */
    .card {
      background: var(--foam);
      border-radius: 22px;
      padding: 32px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45), 0 4px 16px rgba(0,0,0,.25);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--caramel), #f0c060, var(--caramel));
      border-radius: 22px 22px 0 0;
    }

    /* ── Typography helpers ── */
    .section-label { font-size: .95rem; font-weight: 700; color: var(--coffee); text-align: center; margin-bottom: 12px; }
    .divider       { height: 1px; background: var(--cream); margin: 20px 0; }

    /* ── Cup animation ── */
    .cup-wrap { position: relative; display: inline-block; margin-bottom: 4px; }
    .cup-emoji { font-size: 72px; display: block; animation: cupBob 3s ease-in-out infinite; }
    @keyframes cupBob {
      0%,100% { transform: translateY(0) rotate(-4deg); }
      50%     { transform: translateY(-10px) rotate(4deg); }
    }
    .steam { position: absolute; bottom: 78%; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
    .steam span {
      display: block; width: 5px; height: 0; border-radius: 4px;
      background: linear-gradient(to top, rgba(200,150,106,.5), transparent);
      animation: steamUp 2.2s ease-in-out infinite;
    }
    .steam span:nth-child(2) { animation-delay: .6s; }
    .steam span:nth-child(3) { animation-delay: 1.2s; }
    @keyframes steamUp {
      0%   { height: 0;    opacity: 0; transform: scaleX(1) translateY(0); }
      40%  { opacity: .7; }
      100% { height: 38px; opacity: 0; transform: scaleX(2.5) translateY(-44px); }
    }

    /* ── Start Screen ── */
    .start-hero { text-align: center; margin-bottom: 28px; }
    .start-title { font-size: 2.4rem; color: var(--coffee); font-weight: 700; letter-spacing: -.5px; }
    .start-sub   { color: var(--mocha); font-style: italic; margin-top: 4px; font-size: 1rem; }

    /* ── Difficulty buttons ── */
    .diff-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 22px; }
    .diff-btn {
      border: 2px solid var(--latte); background: #fff; border-radius: 14px;
      padding: 14px 6px; text-align: center; cursor: pointer; font-family: inherit;
      transition: border-color .18s, background .18s, color .18s, transform .15s;
    }
    .diff-btn:hover    { border-color: var(--caramel); background: var(--cream); transform: translateY(-2px); }
    .diff-btn.selected { border-color: var(--coffee); background: var(--coffee); color: var(--cream); }
    .diff-name { display: block; font-size: 1rem; font-weight: 700; }
    .diff-time { display: block; font-size: .78rem; margin-top: 3px; opacity: .8; }

    /* ── Buttons ── */
    .btn {
      display: block; width: 100%; padding: 15px;
      border: none; border-radius: 14px;
      font-family: inherit; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; letter-spacing: .3px;
      transition: transform .15s, box-shadow .15s, opacity .2s;
    }
    .btn:hover:not(:disabled)  { transform: translateY(-2px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none !important; }

    .btn-primary {
      background: linear-gradient(135deg, var(--coffee), var(--mocha));
      color: var(--cream);
      box-shadow: 0 4px 18px rgba(74,37,18,.35);
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 7px 24px rgba(74,37,18,.45); }

    .btn-accent {
      background: var(--caramel); color: #fff;
      box-shadow: 0 3px 12px rgba(184,113,26,.3);
      width: auto; padding: 11px 22px; border-radius: 11px; font-size: .95rem;
    }
    .btn-accent:hover:not(:disabled) { box-shadow: 0 5px 16px rgba(184,113,26,.4); }

    .btn-ghost {
      background: transparent; color: var(--err); border: 2px solid var(--err);
      width: auto; padding: 11px 18px; border-radius: 11px; font-size: .9rem;
    }
    .btn-ghost:hover:not(:disabled) { background: var(--err); color: #fff; }

    .btn-home {
      background: transparent; color: var(--mocha); border: 2px solid var(--latte);
      border-radius: 11px; font-size: .95rem;
    }
    .btn-home:hover:not(:disabled) { background: var(--cream); border-color: var(--caramel); color: var(--coffee); }

    .btn-row { display: flex; gap: 10px; align-items: stretch; }
    .btn-row .btn-primary { flex: 1; }

    /* ── Game header ── */
    .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .score-pill { background: var(--coffee); color: var(--cream); padding: 7px 16px; border-radius: 20px; font-size: .88rem; font-weight: 700; }
    .diff-pill  { background: var(--caramel); color: #fff; padding: 5px 13px; border-radius: 20px; font-size: .76rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .q-counter  { text-align: center; color: var(--mocha); font-size: .85rem; margin-bottom: 14px; }

    /* ── Timer ── */
    .timer-wrap  { margin-bottom: 18px; }
    .timer-track { height: 9px; background: var(--cream); border-radius: 5px; overflow: hidden; margin-bottom: 6px; }
    .timer-bar   { height: 100%; border-radius: 5px; background: linear-gradient(90deg, var(--coffee), var(--caramel)); transition: width 1s linear, background .3s; }
    .timer-bar.warn { background: linear-gradient(90deg, var(--err), #ef5350); }
    .timer-num      { text-align: center; font-size: 1.5rem; font-weight: 700; color: var(--coffee); }
    .timer-num.warn { color: var(--err); animation: pulse .5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }

    /* ── Question ── */
    .question-text {
      font-size: 1.15rem; color: var(--espresso); text-align: center;
      line-height: 1.55; font-weight: 700; min-height: 3.5em;
      margin-bottom: 20px; transition: opacity .25s;
    }

    /* ── Answer buttons ── */
    .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 16px; }
    .ans-btn {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 14px 12px; background: #fff; border: 2px solid var(--latte);
      border-radius: 14px; cursor: pointer; font-family: inherit;
      font-size: .9rem; line-height: 1.45; text-align: left; min-height: 68px;
      transition: border-color .18s, background .18s, transform .15s;
    }
    .ans-btn:hover:not(:disabled) { border-color: var(--caramel); background: var(--cream); transform: translateY(-2px); }
    .ans-btn:disabled { cursor: not-allowed; }
    .ans-label {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      background: var(--latte); color: #fff; font-weight: 700; font-size: .82rem;
      display: flex; align-items: center; justify-content: center;
    }
    .ans-btn.correct        { background: var(--ok-bg);  border-color: var(--ok);  color: var(--ok); }
    .ans-btn.correct .ans-label { background: var(--ok); }
    .ans-btn.wrong          { background: var(--err-bg); border-color: var(--err); color: var(--err); }
    .ans-btn.wrong .ans-label   { background: var(--err); }
    .ans-btn.reveal         { background: var(--ok-bg);  border-color: var(--ok);  color: var(--ok); opacity: .8; }
    .ans-btn.reveal .ans-label  { background: var(--ok); }
    .ans-btn.faded          { opacity: .35; }

    /* ── Feedback ── */
    .feedback { border-radius: 11px; padding: 11px 14px; font-size: 1rem; font-weight: 700; text-align: center; display: none; }
    .feedback.show     { display: block; animation: fadeUp .25s ease both; }
    .feedback.ok-fb    { background: var(--ok-bg);  color: var(--ok);  }
    .feedback.err-fb   { background: var(--err-bg); color: var(--err); }

    /* ── Shake ── */
    @keyframes shake {
      0%,100% { transform: translateX(0);    }
      15%,55% { transform: translateX(-9px); }
      35%,75% { transform: translateX(9px);  }
    }
    .shake { animation: shake .5s ease; }

    /* ── Celebration particles ── */
    #celebration { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
    .particle { position: absolute; animation: flyOut var(--dur,.9s) ease-out forwards; }
    @keyframes flyOut {
      0%   { transform: translate(0,0) rotate(0deg) scale(1);                           opacity: 1; }
      100% { transform: translate(var(--dx),var(--dy)) rotate(var(--dr)) scale(.15);    opacity: 0; }
    }

    /* ── Results screen ── */
    .results-hero  { text-align: center; margin-bottom: 16px; }
    .results-icon  { font-size: 64px; display: block; animation: cupBob 3s ease-in-out infinite; }
    .results-title { font-size: 1.9rem; color: var(--coffee); font-weight: 700; }
    .final-score   { text-align: center; font-size: 3.8rem; font-weight: 700; color: var(--coffee); line-height: 1; }
    .score-note    { text-align: center; color: var(--mocha); font-style: italic; font-size: 1rem; margin-top: 6px; }

    /* ── Name input ── */
    .name-label { font-size: .9rem; font-weight: 700; color: var(--coffee); display: block; margin-bottom: 8px; }
    .name-row   { display: flex; gap: 9px; align-items: center; }
    .name-input {
      flex: 1; padding: 13px 15px; border: 2px solid var(--latte); border-radius: 11px;
      font-family: inherit; font-size: .95rem; outline: none; background: #fff; color: var(--espresso);
      transition: border-color .18s;
    }
    .name-input:focus { border-color: var(--coffee); }

    /* ── Leaderboard screen ── */
    .lb-hero  { text-align: center; margin-bottom: 4px; }
    .lb-icon  { font-size: 60px; display: block; animation: cupBob 3s ease-in-out infinite; }
    .lb-title { font-size: 1.85rem; color: var(--coffee); font-weight: 700; margin-top: 4px; }
    .lb-sub   { color: var(--mocha); font-style: italic; font-size: .95rem; margin-top: 6px; }

    .lb-list  { list-style: none; margin-bottom: 4px; }
    .lb-item  {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; background: #fff; border: 1px solid var(--cream);
      border-radius: 11px; margin-bottom: 7px;
    }
    .lb-item.highlight { border-color: #d4a437; background: #fffbf0; }
    .lb-rank  { font-size: 1.15rem; width: 26px; text-align: center; flex-shrink: 0; }
    .lb-name  { flex: 1; font-weight: 700; color: var(--coffee); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-diff  { font-size: .72rem; background: var(--cream); color: var(--mocha); padding: 2px 8px; border-radius: 8px; text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0; }
    .lb-score { font-weight: 700; color: var(--caramel); font-size: 1.05rem; flex-shrink: 0; }
    .lb-empty { text-align: center; color: var(--mocha); font-style: italic; padding: 20px; }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .card          { padding: 20px 14px; border-radius: 18px; }
      .start-title   { font-size: 1.85rem; }
      .cup-emoji     { font-size: 58px; }
      .answers-grid  { grid-template-columns: 1fr; }
      .ans-btn       { min-height: 56px; font-size: .95rem; }
      .question-text { font-size: 1rem; }
      .final-score   { font-size: 2.9rem; }
      .name-row      { flex-direction: column; }
      .name-input    { width: 100%; }
      .btn-accent    { width: 100%; text-align: center; }
      .btn-row       { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="bg-beans" id="bg-beans"></div>
  <div id="celebration"></div>

  <div class="container">

    <!-- ══ START SCREEN ══ -->
    <div id="start-screen" class="screen active">
      <div class="card">
        <div class="start-hero">
          <div class="cup-wrap">
            <div class="steam"><span></span><span></span><span></span></div>
            <span class="cup-emoji">☕</span>
          </div>
          <h1 class="start-title">Coffee Trivia</h1>
          <p class="start-sub">How well do you know your brew?</p>
        </div>

        <p class="section-label">☕ Pick Your Difficulty</p>
        <div class="diff-grid">
          <button class="diff-btn" data-diff="easy">
            <span class="diff-name">Easy</span>
            <span class="diff-time">20 sec / question</span>
          </button>
          <button class="diff-btn selected" data-diff="medium">
            <span class="diff-name">Medium</span>
            <span class="diff-time">15 sec / question</span>
          </button>
          <button class="diff-btn" data-diff="hard">
            <span class="diff-name">Hard</span>
            <span class="diff-time">10 sec / question</span>
          </button>
        </div>

        <button id="start-btn" class="btn btn-primary">Brew the Quiz! ☕</button>
      </div>
    </div>

    <!-- ══ GAME SCREEN ══ -->
    <div id="game-screen" class="screen">
      <div class="card" id="game-card">
        <div class="game-header">
          <div class="score-pill" id="score-pill">Score: 0 / 0</div>
          <div class="diff-pill"  id="diff-pill">Medium</div>
        </div>
        <div class="q-counter">Question <span id="q-num">1</span> of 5</div>
        <div class="timer-wrap">
          <div class="timer-track">
            <div class="timer-bar" id="timer-bar" style="width:100%"></div>
          </div>
          <div class="timer-num" id="timer-num">15</div>
        </div>
        <div class="question-text" id="question-text"></div>
        <div class="answers-grid" id="answers-grid"></div>
        <div class="feedback"      id="feedback"></div>
      </div>
    </div>

    <!-- ══ RESULTS SCREEN ══ -->
    <div id="results-screen" class="screen">
      <div class="card">
        <div class="results-hero">
          <span class="results-icon" id="results-icon">☕</span>
          <h2 class="results-title" id="results-title">Quiz Complete!</h2>
        </div>
        <div class="final-score" id="final-score">0 / 5</div>
        <p  class="score-note"   id="score-note">Keep brewing!</p>
        <div class="divider"></div>
        <label class="name-label">🏅 Enter your name to save your score:</label>
        <div class="name-row">
          <input type="text" id="name-input" class="name-input" placeholder="Your barista name…" maxlength="22" />
          <button id="save-btn" class="btn btn-accent">Save & See Leaderboard →</button>
        </div>
        <div class="divider"></div>
        <button id="home-btn" class="btn btn-home">☕ Go to Home Page</button>
      </div>
    </div>

    <!-- ══ LEADERBOARD SCREEN ══ -->
    <div id="leaderboard-screen" class="screen">
      <div class="card">
        <div class="lb-hero">
          <span class="lb-icon">🏆</span>
          <h2 class="lb-title">Top Brewers</h2>
          <p class="lb-sub" id="lb-sub"></p>
        </div>
        <div class="divider"></div>
        <ul id="lb-list" class="lb-list"></ul>
        <div class="divider"></div>
        <div class="btn-row">
          <button id="play-again-btn" class="btn btn-primary">Play Again ☕</button>
          <button id="clear-btn"      class="btn btn-ghost">Clear Board</button>
        </div>
      </div>
    </div>

  </div><!-- .container -->

<script>
/* ══════════════════════════════════════════════
   QUESTIONS  (10 in pool → 5 picked per game)
══════════════════════════════════════════════ */
const ALL_QUESTIONS = [
  {
    text: "A Mocha is made from espresso, steamed milk, and which key ingredient?",
    answers: ["Caramel syrup","Vanilla extract","Chocolate syrup","Hazelnut cream"],
    correct: 2
  },
  {
    text: "What makes a Spanish Latte different from a regular latte?",
    answers: ["It uses oat milk","It uses sweetened condensed milk","It always has a double shot","It is always served iced"],
    correct: 1
  },
  {
    text: "What is the classic three-part ratio of a Cappuccino?",
    answers: [
      "Half espresso, half steamed milk",
      "One-third espresso, one-third steamed milk, one-third foam",
      "Mostly foam with a dash of espresso",
      "Equal parts espresso and whipped cream"
    ],
    correct: 1
  },
  {
    text: "How is Cold Brew coffee made?",
    answers: [
      "Espresso poured directly over crushed ice",
      "Hot coffee chilled rapidly in the freezer",
      "Coffee grounds steeped in cold water for 12–24 hours",
      "Espresso diluted with cold sparkling water"
    ],
    correct: 2
  },
  {
    text: "What distinguishes a Flat White from a regular Latte?",
    answers: [
      "A flat white uses no milk at all",
      "A flat white has a higher espresso-to-milk ratio with velvety microfoam",
      "A flat white is always flavored with vanilla syrup",
      "A flat white uses twice as much milk as a latte"
    ],
    correct: 1
  },
  {
    text: "An Iced Americano is traditionally made by:",
    answers: [
      "Pouring cold brew over a glass of ice",
      "Chilling hot filter coffee overnight",
      "Pouring espresso shots over cold water and ice",
      "Blending espresso with ice cubes and milk"
    ],
    correct: 2
  },
  {
    text: "A standard single espresso shot is approximately how many milliliters?",
    answers: ["60–90 ml","15–20 ml","25–35 ml","45–55 ml"],
    correct: 2
  },
  {
    text: "What technique creates the swirling patterns of latte art?",
    answers: [
      "Drizzling chocolate syrup on the surface",
      "Pouring steamed microfoam into espresso in a controlled motion",
      "Stenciling powdered cocoa over whipped cream",
      "Freezing milk before adding it to espresso"
    ],
    correct: 1
  },
  {
    text: "Which of these drinks is made ONLY from espresso — no water, no milk added?",
    answers: ["Americano","Long Black","Espresso","Ristretto"],
    correct: 3
  },
  {
    text: "What makes a Ristretto different from a regular espresso?",
    answers: [
      "It uses twice as much water",
      "It is extracted with less water, making it more concentrated",
      "It is always served over ice",
      "It is made from a lighter roast bean"
    ],
    correct: 1
  }
];

const DIFF_CONFIG = {
  easy:   { label: 'Easy',   time: 20 },
  medium: { label: 'Medium', time: 15 },
  hard:   { label: 'Hard',   time: 10 }
};

const LABELS  = ['A','B','C','D'];
const MEDALS  = ['🥇','🥈','🥉','4.','5.'];
const LB_KEY  = 'coffee_trivia_lb_v3';
const EMOJIS  = ['☕','🫘','✨','💛','🌟','💫'];

/* ══════════════════════════════════════════════
   GAME STATE
══════════════════════════════════════════════ */
let g = {
  difficulty: 'medium',
  questions:  [],
  idx:        0,
  score:      0,
  answered:   false,
  timeLeft:   15,
  timeMax:    15,
  timerId:    null,
  audioCtx:   null,
  nodes:      [],
  lastTs:     0
};

/* ══════════════════════════════════════════════
   AUDIO  (Web Audio API — zero external files)
══════════════════════════════════════════════ */
function initAudio() {
  if (!g.audioCtx) g.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (g.audioCtx.state === 'suspended') g.audioCtx.resume();
}
function stopSounds() {
  g.nodes.forEach(n => { try { n.stop(0); } catch(e) {} });
  g.nodes = [];
}
function beep(freq, t0, dur, type='sine', vol=0.24) {
  const ctx  = g.audioCtx;
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(vol, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t0); osc.stop(t0 + dur + .05);
  g.nodes.push(osc);
}
function playCorrect() {
  stopSounds(); initAudio();
  const t = g.audioCtx.currentTime;
  beep(523.25, t,       .15);
  beep(659.25, t + .12, .15);
  beep(783.99, t + .24, .35);
}
function playWrong() {
  stopSounds(); initAudio();
  const t = g.audioCtx.currentTime;
  beep(200, t,       .12, 'sawtooth', .22);
  beep(150, t + .12, .28, 'sawtooth', .16);
}
function playFanfare() {
  stopSounds(); initAudio();
  const t = g.audioCtx.currentTime;
  [523.25, 659.25, 783.99, 1046.5, 783.99, 1046.5]
    .forEach((f, i) => beep(f, t + i*.16, .28, 'sine', .27));
}

/* ══════════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════════ */
function celebrate() {
  const box = document.getElementById('celebration');
  const cx  = window.innerWidth / 2;
  const cy  = window.innerHeight / 2;
  for (let i = 0; i < 16; i++) {
    const el  = document.createElement('div');
    el.className = 'particle';
    el.textContent = EMOJIS[i % EMOJIS.length];
    const ang = (i / 16) * Math.PI * 2;
    const d   = 90 + Math.random() * 130;
    const dx  = Math.cos(ang) * d;
    const dy  = Math.sin(ang) * d - 80;
    const dr  = (Math.random() - .5) * 720;
    const dur = (.75 + Math.random() * .45).toFixed(2) + 's';
    el.style.cssText =
      `left:${cx}px;top:${cy}px;font-size:${18+Math.random()*14}px;` +
      `--dx:${dx}px;--dy:${dy}px;--dr:${dr}deg;--dur:${dur}`;
    box.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}
function shake() {
  const grid = document.getElementById('answers-grid');
  grid.classList.remove('shake');
  void grid.offsetWidth;
  grid.classList.add('shake');
  setTimeout(() => grid.classList.remove('shake'), 600);
}

/* ══════════════════════════════════════════════
   TIMER
══════════════════════════════════════════════ */
function startTimer() {
  clearInterval(g.timerId);
  g.timeMax  = DIFF_CONFIG[g.difficulty].time;
  g.timeLeft = g.timeMax;
  renderTimer();
  g.timerId = setInterval(() => {
    g.timeLeft--;
    renderTimer();
    if (g.timeLeft <= 0) { clearInterval(g.timerId); if (!g.answered) onTimeout(); }
  }, 1000);
}
function stopTimer() { clearInterval(g.timerId); }
function renderTimer() {
  const warn = g.timeLeft <= 5;
  const pct  = (g.timeLeft / g.timeMax) * 100;
  const bar  = document.getElementById('timer-bar');
  const num  = document.getElementById('timer-num');
  bar.style.width = pct + '%';
  bar.className = 'timer-bar' + (warn ? ' warn' : '');
  num.className = 'timer-num' + (warn ? ' warn' : '');
  num.textContent = g.timeLeft;
}
function onTimeout() {
  g.answered = true;
  playWrong(); shake();
  revealCorrect();
  showFeedback(false, `⏰ Time's up! Answer: ${LABELS[curQ().correct]} — ${curQ().answers[curQ().correct]}`);
  setTimeout(advance, 2200);
}

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function curQ() { return g.questions[g.idx]; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ══════════════════════════════════════════════
   GAME FLOW
══════════════════════════════════════════════ */
function startGame() {
  initAudio();
  g.questions = shuffle(ALL_QUESTIONS).slice(0, 5);
  g.idx       = 0;
  g.score     = 0;
  g.answered  = false;

  const card = document.getElementById('game-card');
  card.style.cssText = '';

  document.getElementById('diff-pill').textContent = DIFF_CONFIG[g.difficulty].label;
  showScreen('game-screen');
  renderQuestion();
}

function renderQuestion() {
  g.answered = false;
  const q = curQ();

  document.getElementById('score-pill').textContent = `Score: ${g.score} / ${g.idx}`;
  document.getElementById('q-num').textContent = g.idx + 1;

  const qEl = document.getElementById('question-text');
  qEl.style.opacity = '0';
  qEl.textContent = q.text;
  requestAnimationFrame(() => { qEl.style.transition = 'opacity .3s'; qEl.style.opacity = '1'; });

  const grid = document.getElementById('answers-grid');
  grid.innerHTML = q.answers.map((ans, i) => `
    <button class="ans-btn" data-i="${i}">
      <span class="ans-label">${LABELS[i]}</span>
      <span>${esc(ans)}</span>
    </button>
  `).join('');
  grid.querySelectorAll('.ans-btn').forEach(btn =>
    btn.addEventListener('click', () => onAnswer(+btn.dataset.i))
  );

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  startTimer();
}

function onAnswer(chosen) {
  if (g.answered) return;
  g.answered = true;
  stopTimer();

  const correct = chosen === curQ().correct;

  // Disable all buttons
  document.querySelectorAll('.ans-btn').forEach((b, i) => {
    b.disabled = true;
    if (i !== chosen && i !== curQ().correct) b.classList.add('faded');
  });

  if (correct) {
    document.querySelectorAll('.ans-btn')[chosen].classList.add('correct');
    g.score++;
    playCorrect();
    celebrate();
    showFeedback(true, '☕ Correct! Well brewed!');
  } else {
    document.querySelectorAll('.ans-btn')[chosen].classList.add('wrong');
    revealCorrect();
    playWrong();
    shake();
    showFeedback(false, `✗ Not quite! Answer: ${LABELS[curQ().correct]} — ${curQ().answers[curQ().correct]}`);
  }

  document.getElementById('score-pill').textContent = `Score: ${g.score} / ${g.idx + 1}`;
  setTimeout(advance, 2100);
}

function revealCorrect() {
  document.querySelectorAll('.ans-btn').forEach((b, i) => {
    b.disabled = true;
    if (i === curQ().correct) { b.classList.remove('faded'); b.classList.add('reveal'); }
    else if (!b.classList.contains('wrong')) b.classList.add('faded');
  });
}

function showFeedback(ok, msg) {
  const fb = document.getElementById('feedback');
  fb.textContent = msg;
  fb.className = `feedback show ${ok ? 'ok-fb' : 'err-fb'}`;
}

function advance() {
  g.idx++;
  if (g.idx >= g.questions.length) { endGame(); return; }

  // Slide card left → right
  const card = document.getElementById('game-card');
  card.style.transition = 'opacity .22s ease, transform .22s ease';
  card.style.opacity    = '0';
  card.style.transform  = 'translateX(-28px)';
  setTimeout(() => {
    card.style.transition = 'none';
    card.style.transform  = 'translateX(28px)';
    renderQuestion();
    requestAnimationFrame(() => requestAnimationFrame(() => {
      card.style.transition = 'opacity .28s ease, transform .28s ease';
      card.style.opacity    = '1';
      card.style.transform  = 'translateX(0)';
    }));
  }, 240);
}

/* ══════════════════════════════════════════════
   END GAME → RESULTS SCREEN
══════════════════════════════════════════════ */
function endGame() {
  showScreen('results-screen');

  const pct = g.score / g.questions.length;
  document.getElementById('final-score').textContent = `${g.score} / ${g.questions.length}`;

  let icon, title, note;
  if      (pct === 1  ) { icon='🏆'; title='Perfect Barista!';  note='You\'re a true coffee connoisseur!'; playFanfare(); }
  else if (pct >= .8  ) { icon='☕'; title='Coffee Expert!';    note='Almost a perfect brew!'; }
  else if (pct >= .6  ) { icon='🫘'; title='Coffee Lover!';     note='You really know your beans!'; }
  else if (pct >= .4  ) { icon='🥛'; title='Coffee Beginner';   note='Keep sipping and learning!'; }
  else                  { icon='💧'; title='Decaf Territory!';   note='Time to hit the coffee books!'; }

  document.getElementById('results-icon').textContent  = icon;
  document.getElementById('results-title').textContent = title;
  document.getElementById('score-note').textContent    = note;

  // Reset name input and save button
  document.getElementById('name-input').value = '';
  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled    = false;
  saveBtn.textContent = 'Save & See Leaderboard →';
}

/* ══════════════════════════════════════════════
   LEADERBOARD  (localStorage)
══════════════════════════════════════════════ */
function getLB() {
  try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; }
  catch(e) { return []; }
}

function saveScore(name) {
  const ts = Date.now();
  g.lastTs  = ts;

  let lb = getLB();
  lb.push({ name, score: g.score, total: g.questions.length, diff: g.difficulty, ts });
  lb.sort((a, b) => b.score - a.score || b.ts - a.ts);
  lb = lb.slice(0, 5);
  localStorage.setItem(LB_KEY, JSON.stringify(lb));

  // Play fanfare if new #1
  const rank = lb.findIndex(e => e.ts === ts);
  if (rank === 0 && g.score > 0) playFanfare();

  return rank; // 0-based rank in final lb (-1 if bumped out)
}

function renderLB() {
  const lb   = getLB();
  const list = document.getElementById('lb-list');

  if (!lb.length) {
    list.innerHTML = '<li class="lb-empty">No scores yet — be the first brewer!</li>';
    return;
  }

  list.innerHTML = lb.map((e, i) => `
    <li class="lb-item${e.ts === g.lastTs ? ' highlight' : ''}">
      <span class="lb-rank">${MEDALS[i] || (i+1)+'.'}  </span>
      <span class="lb-name">${esc(e.name)}</span>
      <span class="lb-diff">${e.diff || 'medium'}</span>
      <span class="lb-score">${e.score}/${e.total}</span>
    </li>
  `).join('');
}

/* ══════════════════════════════════════════════
   BACKGROUND BEANS
══════════════════════════════════════════════ */
function spawnBeans() {
  const box = document.getElementById('bg-beans');
  for (let i = 0; i < 18; i++) {
    const el  = document.createElement('div');
    el.className   = 'bg-bean';
    el.textContent = i % 3 === 0 ? '🫘' : '☕';
    const dur = 18 + Math.random() * 22;
    el.style.cssText =
      `left:${Math.random()*100}%;` +
      `animation-duration:${dur}s;` +
      `animation-delay:${-(Math.random()*dur)}s`;
    box.appendChild(el);
  }
}

/* ══════════════════════════════════════════════
   EVENT LISTENERS
══════════════════════════════════════════════ */

// Difficulty selection
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    g.difficulty = btn.dataset.diff;
  });
});

// Start game
document.getElementById('start-btn').addEventListener('click', startGame);

// ★ SAVE BUTTON — saves score then goes straight to leaderboard screen ★
document.getElementById('save-btn').addEventListener('click', () => {
  const saveBtn = document.getElementById('save-btn');
  if (saveBtn.disabled) return;                          // prevent double-click
  saveBtn.disabled = true;

  const name = document.getElementById('name-input').value.trim() || 'Anonymous';
  const rank = saveScore(name);                         // saves to localStorage

  renderLB();                                           // populate the list

  const rankLabel = rank >= 0 ? ` · You ranked #${rank + 1}` : '';
  document.getElementById('lb-sub').textContent =
    `${name} scored ${g.score}/${g.questions.length} on ${DIFF_CONFIG[g.difficulty].label}${rankLabel}`;

  showScreen('leaderboard-screen');                     // go to leaderboard page
});

// Enter key in name field triggers Save
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('save-btn').click();
});

// Home button on results screen
document.getElementById('home-btn').addEventListener('click', () => {
  g.lastTs = 0;
  showScreen('start-screen');
});

// Play Again — goes back to start screen
document.getElementById('play-again-btn').addEventListener('click', () => {
  g.lastTs = 0;
  showScreen('start-screen');
});

// Clear leaderboard
document.getElementById('clear-btn').addEventListener('click', () => {
  if (!confirm('Clear all leaderboard scores? This cannot be undone.')) return;
  localStorage.removeItem(LB_KEY);
  g.lastTs = 0;
  renderLB();
});

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
spawnBeans();
</script>
